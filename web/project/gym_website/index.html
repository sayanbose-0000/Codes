<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gymer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="img/dumbbell-solid.svg" type="x/icons">

    <!--START-font import Libre Baskerville-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville&display=swap" rel="stylesheet">
    <!--END-font import Libre Baskerville-->

</head>

<body>
    <header class="header">
        <div class="left"> <!--for logo-->
            <figure>
                <img src="img/dumbbell-solid.svg" alt="">
                <figcaption class="figcaption"><span class="bold">Gymer</span></figcaption>
            </figure>
        </div>

        <div class="center"> <!--for nav-->
            <div class="home hov">Home</div>
            <div class="about hov">About</div>
            <div class="fitcalc hov">Calculator</div>
            <div class="contact hov">Contact</div>
        </div>

        <div class="right"> <!--buttons-->
            <button class="button-right">Call Us</button>
            <button class="button-right">Email Us</button>
        </div>
    </header>

    <main class="mains">
        <div class="all-forms">
            <fieldset class="form-filedset">
                <legend class="form-caption">Enter Your Details</legend>
                <form class="forms" action="">
                    <input type="text" name="name" id="name" placeholder="Enter your name" class="form-element">
                    <input type="text" name="age" id="age" placeholder="Enter your age" class="form-element">
                    <input type="text" name="gender" id="gender" placeholder="Enter your gender" class="form-element">
                    <input type="text" name="locality" id="locality" placeholder="Enter your locality"
                        class="form-element">

                    <button type="submit" class="form-element submits">Submit</button>
                </form>
            </fieldset>
        </div>
    </main>

    <footer class="footers">
        <p>&copy;This website was created by Sayan Bose</p>
    </footer>
</body>

</html>
